<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Project</title>

  <style>
    :root {
      --bg1: #070b14;
      --bg2: #0f172a;
      --card: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.10);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --accent2: #a78bfa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, var(--bg2), var(--bg1));
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      padding: 48px 42px;
      border-radius: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: radial-gradient(circle at top, rgba(56,189,248,0.15), transparent 60%);
      z-index: 0;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-flex;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.85rem;
      color: var(--accent);
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.25);
      margin-bottom: 18px;
    }

    h1 {
      font-size: 2.7rem;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hello {
      font-size: 1.25rem;
      margin-bottom: 14px;
      color: #fff;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 26px;
    }

    a.button {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), #60a5fa);
      color: #0b1220;
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.25);
      transition: all 0.25s ease;
    }

    a.button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(56, 189, 248, 0.35);
    }

    footer {
      margin-top: 28px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    code {
      background: rgba(255,255,255,0.08);
      padding: 3px 7px;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="badge">⚡ GitHub Pages + Actions</div>

    <h1>My Project 🚀</h1>

    <div class="hello">Hello GitHub Actions! 👋</div>

    <p>
      Welcome to my GitHub Pages site! This is a clean, modern landing page
      powered by GitHub Actions and deployed automatically.
    </p>

    <a class="button"
       href="https://github.com/Sadnik/devops-journey/tree/master/small-devops-projects/Github-Pages-project"
       target="_blank">
      View Repo
    </a>

    <footer>
      Built with love using GitHub Pages • Deploy via <code>GitHub Actions</code>
    </footer>
  </div>
</body>
</html>
