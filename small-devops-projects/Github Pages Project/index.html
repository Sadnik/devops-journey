<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Project</title>

  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, var(--bg2), var(--bg1));
      color: var(--text);
      padding: 20px;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 40px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      text-align: center;
    }

    .badge {
      display: inline-block;
      margin-bottom: 15px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
      font-size: 0.9rem;
      border: 1px solid rgba(56, 189, 248, 0.3);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hello {
      font-size: 1.4rem;
      margin: 15px 0;
      color: #ffffff;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    a.button {
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 10px;
      background: var(--accent);
      color: #0f172a;
      font-weight: 600;
      transition: 0.2s ease;
    }

    a.button:hover {
      transform: translateY(-2px);
      background: #7dd3fc;
    }

    a.secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--text);
    }

    footer {
      margin-top: 25px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    code {
      background: rgba(255,255,255,0.08);
      padding: 3px 6px;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="badge">GitHub Pages + Actions</div>

    <h1>My Project 🚀</h1>

    <div class="hello">Hello GitHub Actions! 👋</div>

    <p>
      Welcome to my GitHub Pages site! This is a clean, modern landing page
      powered by GitHub Actions and deployed automatically.
    </p>

    <div class="buttons">
      <a class="button" href="https://github.com/" target="_blank">View Repo</a>
      <a class="button secondary" href="#">Live Demo</a>
    </div>

    <footer>
      Built with ❤️ using GitHub Pages • Deploy via <code>GitHub Actions</code>
    </footer>
  </div>
</body>
</html>
