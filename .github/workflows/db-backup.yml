name: Database Backup

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Backup MongoDB and upload to S3
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
            BACKUP_FILE="backup_${TIMESTAMP}.tar.gz"
            mongodump --db mydb --out /tmp/mongobackup
            tar -czf /tmp/${BACKUP_FILE} -C /tmp mongobackup
            aws s3 cp /tmp/${BACKUP_FILE} s3://nicko-db-backups/backups/${BACKUP_FILE}
            rm -rf /tmp/mongobackup /tmp/${BACKUP_FILE}
            echo "Backup ${BACKUP_FILE} uploaded."